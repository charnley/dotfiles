# WirePlumber ALSA node rules for USB audio devices
#
# Prevents error cascades when USB audio devices are unplugged mid-session.
# The RODE VideoMic NTG is an input-only device (microphone); this rule
# ensures it is treated as such and that its removal does not corrupt the
# PipeWire clock for other audio devices (e.g. the Unittek USB audio adapter).

monitor.alsa.rules = [
  {
    matches = [
      {
        node.name = "~alsa_output.usb-R__DE_Microphones.*"
      }
    ]
    actions = {
      update-props = {
        # Prevent PipeWire from using the RODE as an output sink.
        # It is a microphone; only the capture node should be active.
        node.disabled = true
      }
    }
  }
  {
    matches = [
      {
        node.name = "~alsa_input.usb-R__DE_Microphones.*"
      }
      {
        node.name = "~alsa_output.usb-R__DE_Microphones.*"
      }
    ]
    actions = {
      update-props = {
        # Do not retry indefinitely when the device is unplugged.
        # This prevents the error spam loop that corrupts the PipeWire
        # audio clock and breaks other audio devices (e.g. Unittek).
        session.suspend-timeout-seconds = 0
        node.pause-on-idle = false
      }
    }
  }
]
